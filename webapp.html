<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Trivia – Ryan Richards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0d1b2a;
      --blue: #1b4f72;
      --gold: #f4c430;
      --green: #27ae60;
      --red: #e74c3c;
      --light: #f0f4f8;
      --white: #ffffff;
      --card-bg: #162335;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }

    /* NAV */
    .top-nav {
      background: rgba(0,0,0,0.4);
      padding: 14px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
    }

    .top-nav a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .top-nav a:hover { color: var(--white); }

    .top-nav .site-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--white);
      letter-spacing: 2px;
    }

    /* MAIN CONTAINER */
    .app-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 50px 24px 80px;
    }

    /* HEADER */
    .app-header {
      text-align: center;
      margin-bottom: 44px;
    }

    .app-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 4px 16px rgba(244,196,48,0.3);
      margin-bottom: 10px;
    }

    .app-header p {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
    }

    /* SCORE BAR */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 18px 28px;
      margin-bottom: 32px;
      border: 1px solid rgba(244,196,48,0.2);
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
    }

    .score-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .score-value.green { color: var(--green); }

    /* CATEGORY BUTTONS */
    .category-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .category-label {
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .category-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: var(--card-bg);
      border: 2px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn:hover, .cat-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(244,196,48,0.1);
    }

    /* QUESTION CARD */
    .question-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 36px 36px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--gold), #e67e22);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .question-num {
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 700;
    }

    .difficulty-badge {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .difficulty-badge.easy { background: rgba(39,174,96,0.2); color: var(--green); }
    .difficulty-badge.medium { background: rgba(244,196,48,0.2); color: var(--gold); }
    .difficulty-badge.hard { background: rgba(231,76,60,0.2); color: var(--red); }

    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 28px;
      color: var(--white);
    }

    /* ANSWER OPTIONS */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      color: var(--white);
      padding: 16px 18px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(244,196,48,0.1);
      transform: translateY(-1px);
    }

    .option-btn.correct {
      border-color: var(--green);
      background: rgba(39,174,96,0.2);
      color: var(--green);
    }

    .option-btn.wrong {
      border-color: var(--red);
      background: rgba(231,76,60,0.15);
      color: var(--red);
    }

    .option-btn:disabled { cursor: default; }

    .option-letter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    /* FEEDBACK */
    .feedback-box {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    .feedback-box.show { display: block; }
    .feedback-box.correct-fb { background: rgba(39,174,96,0.15); border: 1px solid var(--green); color: var(--green); }
    .feedback-box.wrong-fb { background: rgba(231,76,60,0.15); border: 1px solid var(--red); color: #ff8a80; }

    /* NEXT BUTTON */
    .next-btn {
      display: none;
      margin: 24px auto 0;
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 14px 40px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 0.15s, background 0.15s;
    }

    .next-btn:hover { background: #ffd04d; transform: translateY(-2px); }
    .next-btn.show { display: block; }

    /* RESULTS SCREEN */
    .results-screen {
      display: none;
      text-align: center;
      padding: 50px 30px;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .results-screen.show { display: block; }

    .results-emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .results-score {
      font-size: 1.4rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
    }

    .results-grade {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }

    .play-again-btn {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 16px 48px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 0.15s;
    }

    .play-again-btn:hover { transform: scale(1.04); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* PROGRESS BAR */
    .progress-bar-wrap {
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #e67e22);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    @media (max-width: 550px) {
      .options-grid { grid-template-columns: 1fr; }
      .question-card { padding: 24px 20px 20px; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <span class="site-name">Ryan Richards</span>
    <div style="display:flex;gap:20px;">
      <a href="index.html">Home</a>
      <a href="scratch.html">Scratch Page</a>
    </div>
  </nav>

  <div class="app-wrapper">

    <div class="app-header">
      <h1>Sports Trivia</h1>
      <p>Test your knowledge across football, basketball, baseball, golf & more</p>
    </div>

    <!-- SCORE BAR -->
    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">Score</span>
        <span class="score-value green" id="scoreDisplay">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Question</span>
        <span class="score-value" id="questionCounter">1 / 10</span>
      </div>
      <div class="score-item">
        <span class="score-label">Streak</span>
        <span class="score-value" id="streakDisplay">0 🔥</span>
      </div>
    </div>

    <!-- CATEGORY FILTER -->
    <div class="category-section">
      <div class="category-label">Category</div>
      <div class="category-btns">
        <button class="cat-btn active" onclick="setCategory('all', this)">All Sports</button>
        <button class="cat-btn" onclick="setCategory('football', this)">🏈 Football</button>
        <button class="cat-btn" onclick="setCategory('basketball', this)">🏀 Basketball</button>
        <button class="cat-btn" onclick="setCategory('baseball', this)">⚾ Baseball</button>
        <button class="cat-btn" onclick="setCategory('golf', this)">⛳ Golf</button>
        <button class="cat-btn" onclick="setCategory('other', this)">🏆 Other</button>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:10%"></div>
    </div>

    <!-- QUESTION CARD -->
    <div class="question-card" id="questionCard">
      <div class="question-meta">
        <span class="question-num" id="questionNum">Question 1</span>
        <span class="difficulty-badge" id="diffBadge">Easy</span>
      </div>
      <div class="question-text" id="questionText">Loading question...</div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="feedback-box" id="feedbackBox"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="results-screen" id="resultsScreen">
      <div class="results-emoji" id="resultsEmoji">🏆</div>
      <div class="results-title">Final Score</div>
      <div class="results-score" id="resultsScore">0 / 10</div>
      <div class="results-grade" id="resultsGrade">Keep practicing!</div>
      <button class="play-again-btn" onclick="restartGame()">Play Again</button>
    </div>

  </div>

  <script>
    const allQuestions = [
      // FOOTBALL
      { category: 'football', difficulty: 'easy', question: "How many points is a touchdown worth in American football?", options: ["3", "6", "7", "8"], answer: 1 },
      { category: 'football', difficulty: 'easy', question: "Which team has won the most Super Bowls?", options: ["New England Patriots", "Dallas Cowboys", "San Francisco 49ers", "Pittsburgh Steelers"], answer: 3 },
      { category: 'football', difficulty: 'medium', question: "Who holds the NFL record for most career passing yards?", options: ["Tom Brady", "Drew Brees", "Peyton Manning", "Brett Favre"], answer: 1 },
      { category: 'football', difficulty: 'hard', question: "In what year was the first Super Bowl played?", options: ["1965", "1967", "1969", "1971"], answer: 1 },
      { category: 'football', difficulty: 'medium', question: "How many players does each team have on the field at one time?", options: ["9", "10", "11", "12"], answer: 2 },

      // BASKETBALL
      { category: 'basketball', difficulty: 'easy', question: "How tall is a regulation NBA basketball hoop?", options: ["8 feet", "9 feet", "10 feet", "11 feet"], answer: 2 },
      { category: 'basketball', difficulty: 'easy', question: "Who holds the record for most career points in NBA history?", options: ["Michael Jordan", "Kobe Bryant", "Kareem Abdul-Jabbar", "LeBron James"], answer: 3 },
      { category: 'basketball', difficulty: 'medium', question: "How many seconds does a team have to attempt a shot in the NBA?", options: ["20", "24", "30", "35"], answer: 1 },
      { category: 'basketball', difficulty: 'hard', question: "Which NBA team went 72-10 in the 1995–96 season?", options: ["Los Angeles Lakers", "Boston Celtics", "Chicago Bulls", "Detroit Pistons"], answer: 2 },
      { category: 'basketball', difficulty: 'medium', question: "How many championships did Michael Jordan win with the Chicago Bulls?", options: ["4", "5", "6", "7"], answer: 2 },

      // BASEBALL
      { category: 'baseball', difficulty: 'easy', question: "How many strikes does it take to strike out a batter?", options: ["2", "3", "4", "5"], answer: 1 },
      { category: 'baseball', difficulty: 'easy', question: "How many outs are in a half inning?", options: ["2", "3", "4", "6"], answer: 1 },
      { category: 'baseball', difficulty: 'medium', question: "Who holds the MLB record for career home runs?", options: ["Babe Ruth", "Hank Aaron", "Barry Bonds", "Alex Rodriguez"], answer: 2 },
      { category: 'baseball', difficulty: 'hard', question: "What is the distance from home plate to first base?", options: ["60 feet", "75 feet", "90 feet", "100 feet"], answer: 2 },
      { category: 'baseball', difficulty: 'medium', question: "Which team has won the most World Series titles?", options: ["Boston Red Sox", "New York Yankees", "Los Angeles Dodgers", "St. Louis Cardinals"], answer: 1 },

      // GOLF
      { category: 'golf', difficulty: 'easy', question: "How many holes are in a standard round of golf?", options: ["9", "12", "18", "24"], answer: 2 },
      { category: 'golf', difficulty: 'easy', question: "What is it called when a golfer finishes a hole 1 under par?", options: ["Eagle", "Birdie", "Bogey", "Par"], answer: 1 },
      { category: 'golf', difficulty: 'medium', question: "Which golfer has won the most Masters Tournaments?", options: ["Tiger Woods", "Jack Nicklaus", "Arnold Palmer", "Phil Mickelson"], answer: 1 },
      { category: 'golf', difficulty: 'hard', question: "What is the name of the trophy awarded to The Open Championship winner?", options: ["The Silver Cup", "The Golden Jug", "The Claret Jug", "The Victoria Cup"], answer: 2 },
      { category: 'golf', difficulty: 'medium', question: "At which course is The Masters Tournament held every year?", options: ["Pebble Beach", "Augusta National", "St Andrews", "Pinehurst"], answer: 1 },

      // OTHER
      { category: 'other', difficulty: 'easy', question: "How long is an Olympic swimming pool?", options: ["25 meters", "50 meters", "75 meters", "100 meters"], answer: 1 },
      { category: 'other', difficulty: 'easy', question: "In soccer, how many players are on the field per team?", options: ["9", "10", "11", "12"], answer: 2 },
      { category: 'other', difficulty: 'medium', question: "Which country has won the most FIFA World Cups?", options: ["Germany", "Argentina", "Brazil", "Italy"], answer: 2 },
      { category: 'other', difficulty: 'hard', question: "How many gold medals did Michael Phelps win across his Olympic career?", options: ["18", "20", "23", "28"], answer: 2 },
      { category: 'other', difficulty: 'medium', question: "In tennis, what is the term for a score of 40-40?", options: ["Tie", "Deuce", "Equalizer", "Level"], answer: 1 },
    ];

    let currentCategory = 'all';
    let filteredQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let answered = false;
    const QUESTIONS_PER_GAME = 10;

    function setCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      restartGame();
    }

    function getFilteredQuestions() {
      let pool = currentCategory === 'all' ? allQuestions : allQuestions.filter(q => q.category === currentCategory);
      // Shuffle
      let shuffled = [...pool].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, Math.min(QUESTIONS_PER_GAME, shuffled.length));
    }

    function loadQuestion() {
      const q = filteredQuestions[currentIndex];
      answered = false;

      document.getElementById('questionNum').textContent = `Question ${currentIndex + 1}`;
      document.getElementById('questionCounter').textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
      document.getElementById('questionText').textContent = q.question;

      const badge = document.getElementById('diffBadge');
      badge.textContent = q.difficulty.charAt(0).toUpperCase() + q.difficulty.slice(1);
      badge.className = `difficulty-badge ${q.difficulty}`;

      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
      });

      document.getElementById('feedbackBox').className = 'feedback-box';
      document.getElementById('feedbackBox').textContent = '';
      document.getElementById('nextBtn').className = 'next-btn';

      const progress = ((currentIndex) / filteredQuestions.length) * 100;
      document.getElementById('progressBar').style.width = `${Math.max(progress, 5)}%`;
    }

    function selectAnswer(chosen) {
      if (answered) return;
      answered = true;

      const q = filteredQuestions[currentIndex];
      const btns = document.querySelectorAll('.option-btn');
      const feedback = document.getElementById('feedbackBox');

      btns.forEach(btn => btn.disabled = true);

      if (chosen === q.answer) {
        btns[chosen].classList.add('correct');
        score++;
        streak++;
        document.getElementById('scoreDisplay').textContent = score;
        feedback.textContent = '✅ Correct! ' + getFunFact(q);
        feedback.className = 'feedback-box correct-fb show';
      } else {
        btns[chosen].classList.add('wrong');
        btns[q.answer].classList.add('correct');
        streak = 0;
        feedback.textContent = `❌ Not quite! The answer was: ${q.options[q.answer]}`;
        feedback.className = 'feedback-box wrong-fb show';
      }

      document.getElementById('streakDisplay').textContent = streak + (streak >= 3 ? ' 🔥' : '');
      document.getElementById('nextBtn').className = 'next-btn show';
    }

    function getFunFact(q) {
      const facts = {
        'How many holes are in a standard round of golf?': 'The 18-hole tradition originated at St Andrews in the 1850s.',
        'Which golfer has won the most Masters Tournaments?': 'Tiger has 5 Masters titles (1997, 2001, 2002, 2005, 2019).',
        'Who holds the record for most career home runs?': 'Barry Bonds hit 762 career home runs.',
        'Who holds the NBA record for most career points?': 'LeBron surpassed Kareem in 2023.',
      };
      return facts[q.question] || 'Great sports knowledge!';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= filteredQuestions.length) {
        showResults();
      } else {
        loadQuestion();
      }
    }

    function showResults() {
      document.getElementById('questionCard').style.display = 'none';
      document.getElementById('progressBar').style.width = '100%';

      const total = filteredQuestions.length;
      const pct = score / total;
      let emoji = '😅', grade = 'Keep practicing — you\'ll get there!';
      if (pct === 1) { emoji = '🏆'; grade = 'Perfect score! You\'re a sports genius!'; }
      else if (pct >= 0.8) { emoji = '🥇'; grade = 'Excellent! You really know your sports!'; }
      else if (pct >= 0.6) { emoji = '🥈'; grade = 'Solid effort! Pretty good sports knowledge.'; }
      else if (pct >= 0.4) { emoji = '🥉'; grade = 'Not bad! A few more study sessions and you\'ll ace it.'; }

      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsScore').textContent = `${score} / ${total}`;
      document.getElementById('resultsGrade').textContent = grade;
      document.getElementById('resultsScreen').className = 'results-screen show';
    }

    function restartGame() {
      currentIndex = 0;
      score = 0;
      streak = 0;
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('streakDisplay').textContent = '0';
      document.getElementById('questionCard').style.display = 'block';
      document.getElementById('resultsScreen').className = 'results-screen';
      filteredQuestions = getFilteredQuestions();
      loadQuestion();
    }

    // Init
    restartGame();
  </script>

</body>
</html>
